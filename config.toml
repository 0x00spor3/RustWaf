[proxy]
listen = "0.0.0.0:8080"
backend = "http://127.0.0.1:8000"

[waf]
mode = "detection-only"
block_threshold = 5
paranoia_level = 1          # 1..=4 — higher activates more (noisier) rules

# Comportamento quando È IL WAF in difficoltà — policy ESPLICITA per-scenario.
# (Il vecchio waf.fail_open è stato rimosso: usa questa sezione.)
[resilience]
on_upstream_error   = "fail_closed"   # origin giù/timeout -> 502 (closed) | 503 (open, retryable)
on_internal_error   = "fail_open"     # panic/bug di un modulo NON deve abbattere il sito
on_config_error     = "fail_open"     # reload invalido (P3) -> tieni last-good config
on_parser_limit     = "fail_closed"   # normalization fallita -> 400 (closed) | inoltra non-ispezionato (open)
upstream_timeout_ms = 30000           # tetto round-trip upstream (no hang del worker)

# Point weight per severity class. Each matched rule contributes its severity's
# weight to the cumulative anomaly score; the request blocks at block_threshold.
# Config C2 (Fase 7 / Pilastro 2): critical raised 5 -> 6 so a single high-confidence
# rule blocks with own-merit margin >= 1, while weak signals stay sub-threshold
# (accumulation-only). Matches the waf-core production default.
# Source of truth / rationale: ARCHITECTURE §7.
[waf.severity_scores]
critical = 6
error    = 4
warning  = 3
notice   = 2

# Rate limiting L7 (on_connection). Token bucket per key.
# NB: key = "client_ip" è la PEER socket addr; dietro un LB/CDN coincide con
# l'IP del proxy → throttle collettivo. XFF + trusted-proxy è estensione nota (§8).
[rate_limit]
enabled          = true
key              = "client_ip"
requests         = 100        # token per finestra
window_seconds   = 60
burst            = 100        # capacità bucket (default = requests)
action           = "block"    # "block" -> 429 | "score" -> contributo allo score
score            = 5          # punti se action = "score"
max_tracked_keys = 100000     # cap memoria; sweep evince i bucket idle

# Risoluzione SICURA dell'IP client (condivisa da rate limit, logging e futura
# Geo/IP-reputation). L'IP risolto è derivato UNA volta e finisce in
# ctx.client_ip. Fail-safe: con trusted_proxies vuoto l'header XFF è SEMPRE
# ignorato e si usa la peer addr (un deploy non configurato non è spoofabile).
[network]
trusted_proxies  = []               # CIDR dei TUOI proxy/LB/CDN, es. ["10.0.0.0/8","::1"]
client_ip_header = "X-Forwarded-For"
trusted_hops     = 1                 # quanti hop fidarsi contando da DESTRA (mai il primo IP)

[limits]
max_body_size    = 1048576   # 1 MiB
max_header_size  = 8192      # 8 KiB per header
max_headers      = 100
max_params       = 100
max_cookies      = 50
max_json_depth   = 20

[modules.sqli]
enabled = true

[modules.xss]
enabled = true

[modules.path_traversal]
enabled = true

[modules.rce]
enabled = true

[modules.lfi_rfi]
enabled = true

[modules.ssrf]
enabled = true

[modules.header_injection]
enabled = true

# Validazione del FRAMING HTTP (CL/TE) — controllo strutturale, NON content-inspection.
# Default true: bassissimo falso-positivo (scatta solo su framing illegale/ambiguo).
[modules.request_smuggling]
enabled = true
