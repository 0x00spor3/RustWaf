[proxy]
listen = "0.0.0.0:8080"
backend = "http://127.0.0.1:8000"

# Terminazione TLS sul listener (Fase 12). DEFAULT OFF → il listener serve in chiaro
# (h1 + h2c), esattamente come prima. Quando enabled=true il listener serve SOLO TLS
# (h1/h2 negoziati via ALPN); NIENTE fallback a chiaro sulla stessa porta. Un cert
# illeggibile con enabled=true = errore FATALE al boot (fail-closed, niente downgrade).
# Termination base, cert-da-file = core/OPEN (BOUNDARY §3.2). ACME/rotation/mTLS-PKI =
# enterprise (stesso seam TlsCertSource). Vedi ARCHITECTURE §9.
[tls]
enabled   = false
cert_path = "/etc/waf/tls/cert.pem"   # catena PEM (leaf per primo)
key_path  = "/etc/waf/tls/key.pem"    # chiave PEM (PKCS#8 / PKCS#1 / SEC1)
alpn      = ["h2", "http/1.1"]         # h2-ready (gRPC-over-TLS futuro); h1-only ripiega a http/1.1

[waf]
mode = "blocking"
block_threshold = 5
paranoia_level = 1          # 1..=4 — higher activates more (noisier) rules

# Comportamento quando È IL WAF in difficoltà — policy ESPLICITA per-scenario.
# (Il vecchio waf.fail_open è stato rimosso: usa questa sezione.)
[resilience]
on_upstream_error   = "fail_closed"   # origin giù/timeout -> 502 (closed) | 503 (open, retryable)
on_internal_error   = "fail_open"     # panic/bug di un modulo NON deve abbattere il sito
on_config_error     = "fail_open"     # reload invalido (P3) -> tieni last-good config
on_parser_limit     = "fail_closed"   # normalization fallita -> 400 (closed) | inoltra non-ispezionato (open)
upstream_timeout_ms = 30000           # tetto round-trip upstream (no hang del worker)

# Point weight per severity class. Each matched rule contributes its severity's
# weight to the cumulative anomaly score; the request blocks at block_threshold.
# Config C2 (Fase 7 / Pilastro 2): critical raised 5 -> 6 so a single high-confidence
# rule blocks with own-merit margin >= 1, while weak signals stay sub-threshold
# (accumulation-only). Matches the waf-core production default.
# Source of truth / rationale: ARCHITECTURE §7.
[waf.severity_scores]
critical = 6
error    = 4
warning  = 3
notice   = 2

# Rate limiting L7 (on_connection). Token bucket per key.
# NB: key = "client_ip" è la PEER socket addr; dietro un LB/CDN coincide con
# l'IP del proxy → throttle collettivo. XFF + trusted-proxy è estensione nota (§8).
[rate_limit]
enabled          = true
key              = "client_ip"
requests         = 100        # token per finestra
window_seconds   = 60
burst            = 100        # capacità bucket (default = requests)
action           = "block"    # "block" -> 429 | "score" -> contributo allo score
score            = 5          # punti se action = "score"
max_tracked_keys = 100000     # cap memoria; sweep evince i bucket idle

# Risoluzione SICURA dell'IP client (condivisa da rate limit, logging e futura
# Geo/IP-reputation). L'IP risolto è derivato UNA volta e finisce in
# ctx.client_ip. Fail-safe: con trusted_proxies vuoto l'header XFF è SEMPRE
# ignorato e si usa la peer addr (un deploy non configurato non è spoofabile).
[network]
trusted_proxies  = []               # CIDR dei TUOI proxy/LB/CDN, es. ["10.0.0.0/8","::1"]
client_ip_header = "X-Forwarded-For"
trusted_hops     = 1                 # quanti hop fidarsi contando da DESTRA (mai il primo IP)

[limits]
max_body_size    = 1048576   # 1 MiB
max_header_size  = 8192      # 8 KiB per header
max_headers      = 100
max_params       = 100
max_cookies      = 50
max_json_depth   = 20

[modules.sqli]
enabled = true

[modules.xss]
enabled = true

[modules.path_traversal]
enabled = true

[modules.rce]
enabled = true

[modules.lfi_rfi]
enabled = true

[modules.ssrf]
enabled = true

# ── moduli detection Fase 10a/10b (firme inequivocabili per categoria) ──────────
[modules.ldap]
enabled = true

[modules.nosql]
enabled = true

[modules.mail]
enabled = true

[modules.ssti]
enabled = true

# Fingerprint di scanner/tool sul solo User-Agent (sqlmap/nuclei/… + domini OOB).
[modules.scanner]
enabled = true

# Server-Side Includes injection (<!--#exec|include|…).
[modules.ssi]
enabled = true

# XML External Entity (<!ENTITY / <!DOCTYPE…SYSTEM / encoding="UTF-7").
[modules.xxe]
enabled = true

[modules.header_injection]
enabled = true

# Validazione del FRAMING HTTP (CL/TE) — controllo strutturale, NON content-inspection.
# Default true: bassissimo falso-positivo (scatta solo su framing illegale/ambiguo).
[modules.request_smuggling]
enabled = true

# Protezioni STRUTTURALI GraphQL (Fase 11) — come request_smuggling, NON content-inspection:
# cap DoS/abuse sulla FORMA dell'operazione GraphQL (depth/alias/field/directive/batch) +
# policy introspection, via parse lessicale. DEFAULT OFF: endpoint-specifico, i cap vanno
# tarati per app. Ispeziona JSON `query`/GET `?query=` solo sui `paths`, e ogni body
# `application/graphql`.
[modules.graphql]
enabled             = false
paths               = ["/graphql"]
max_depth           = 15            # max nesting del selection-set (paren-aware)
max_aliases         = 30            # cap alias-bomb
max_fields          = 1000          # proxy di complessità (conteggio selezioni)
max_directives      = 50
max_batch           = 10            # max operazioni in una richiesta batch
block_introspection = false         # blocca __schema/__type → 403

# Protezioni STRUTTURALI gRPC — come graphql, NON content-inspection: il CONTENUTO dei campi
# protobuf è ispezionato dai moduli normali via §6 (de-framing + estrazione leaf), questo modulo
# applica cap DoS sulla FORMA del messaggio + policy compressi. DEFAULT OFF: endpoint-specifico,
# cap da tarare. Identifica application/grpc*.
# NB: gRPC gira su HTTP/2, che è SEMPRE servito (h2c in chiaro via auto::Builder, oppure h2 su TLS
# se [tls] è attivo). TLS NON è richiesto dal modulo gRPC: i due flag sono indipendenti.
[modules.grpc]
enabled           = false
max_message_bytes = 4194304          # 4 MiB — cap dimensione totale payload ispezionabile
max_fields        = 4096             # cap field-bomb
max_depth         = 16               # cap depth-bomb (nesting sub-message)
on_compressed     = "reject"         # payload compresso = opaco: "reject" (fail-closed) | "passthrough"
